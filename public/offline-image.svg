<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- خلفية -->
  <rect width="400" height="300" fill="#F5F5F5"/>
  
  <!-- رمز عدم الاتصال -->
  <circle cx="200" cy="120" r="50" fill="#EBEBEB" stroke="#C68B48" stroke-width="2"/>
  <line x1="170" y1="90" x2="230" y2="150" stroke="#C68B48" stroke-width="3"/>
  <path d="M165 120C165 120 175 100 200 100C225 100 235 120 235 120" stroke="#C68B48" stroke-width="3" stroke-linecap="round"/>
  <path d="M175 135C175 135 185 125 200 125C215 125 225 135 225 135" stroke="#C68B48" stroke-width="3" stroke-linecap="round"/>
  
  <!-- نص الرسالة -->
  <rect x="100" y="190" width="200" height="30" rx="5" fill="#EBEBEB"/>
  <text x="200" y="210" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#666">
    غير متصل بالإنترنت
  </text>
  
  <!-- شعار أومنيرا فاليه المبسط -->
  <text x="200" y="240" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#C68B48">
    أومنيرا فاليه
  </text>
  
  <!-- مستطيل تزييني -->
  <rect x="170" y="250" width="60" height="5" rx="2" fill="#C68B48"/>
</svg>
